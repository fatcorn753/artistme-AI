<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Screenshot Annotator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="home-screen" class="home-screen">
    <h1>📸 Screenshot Annotator</h1>
    <p class="description">現在のページをキャプチャして注釈を追加できます。</p>
    <button id="btn-capture" class="capture-btn">📸 スクリーンショット撮影</button>
    <div id="cap-error" class="error hidden"></div>
    <div class="saved-label">最近保存した画像</div>
    <div id="saved-list" class="saved-list"></div>
  </div>

  <div id="editor-screen" class="editor-screen hidden">
    <div class="editor-toolbar">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pen" title="ペン">✏️</button>
        <button class="tool-btn" data-tool="arrow" title="矢印">↗</button>
        <button class="tool-btn" data-tool="rect" title="四角">▭</button>
        <button class="tool-btn" data-tool="text" title="テキスト">T</button>
        <button class="tool-btn" data-tool="blur" title="ぼかし">🔲</button>
      </div>
      <div class="tool-group">
        <input type="color" id="ann-color" value="#ef4444" title="色">
        <input type="range" id="ann-size" min="1" max="20" value="3" title="サイズ">
      </div>
      <div class="tool-group">
        <button id="btn-undo" class="icon-btn" title="元に戻す">↩</button>
        <button id="btn-clear-ann" class="icon-btn" title="全消去">🗑</button>
      </div>
      <div class="tool-group">
        <button id="btn-save" class="save-btn">💾 保存</button>
        <button id="btn-copy-ann" class="save-btn">⎘ コピー</button>
        <button id="btn-back" class="back-btn">← 戻る</button>
      </div>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="base-canvas"></canvas>
      <canvas id="ann-canvas"></canvas>
    </div>
  </div>
  <script src="annotator.js"></script>
</body>
</html>

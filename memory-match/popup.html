<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Memory Match</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧠 Memory Match</h1>
      <div class="header-stats">
        <span>手数: <strong id="moves">0</strong></span>
        <span>時間: <strong id="timer">0:00</strong></span>
      </div>
    </div>

    <div class="diff-row">
      <button class="diff-btn active" data-cols="4" data-rows="4">4×4</button>
      <button class="diff-btn" data-cols="5" data-rows="4">5×4</button>
      <button class="diff-btn" data-cols="6" data-rows="4">6×4</button>
    </div>

    <div id="board" class="board"></div>

    <div class="footer">
      <button id="btn-new" class="new-btn">新しいゲーム</button>
      <span class="best-label">最高 <strong id="best-score">—</strong></span>
    </div>

    <div id="win-overlay" class="win-overlay hidden">
      <div class="win-icon">🎉</div>
      <div class="win-title">クリア！</div>
      <div class="win-stats" id="win-stats"></div>
      <button id="btn-win-new" class="new-btn">もう一度</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Clean Reader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <h1>📖 Clean Reader</h1>
      <div class="toolbar-right">
        <button id="btn-extract" class="extract-btn">🔍 本文を抽出</button>
        <button id="btn-open-reader" class="open-btn" disabled>📄 全画面で読む</button>
      </div>
    </div>

    <!-- Settings -->
    <div class="settings-bar">
      <div class="setting-item">
        <label>テーマ</label>
        <div class="theme-btns">
          <button class="theme-btn active" data-theme="dark">🌙</button>
          <button class="theme-btn" data-theme="light">☀️</button>
          <button class="theme-btn" data-theme="sepia">📜</button>
        </div>
      </div>
      <div class="setting-item">
        <label>文字サイズ</label>
        <input type="range" id="font-size-slider" min="12" max="22" value="15">
        <span id="font-size-display">15</span>
      </div>
      <div class="setting-item">
        <label>行間</label>
        <input type="range" id="line-height-slider" min="1.4" max="2.2" step="0.1" value="1.8">
      </div>
    </div>

    <!-- Article preview -->
    <div id="loading-state" class="state-panel hidden">
      <div class="state-icon">🔍</div>
      <div class="state-msg">本文を抽出中...</div>
    </div>

    <div id="empty-state" class="state-panel">
      <div class="state-icon">📖</div>
      <div class="state-msg">「本文を抽出」ボタンを押すと<br>現在のページからクリーンな本文を取得します</div>
    </div>

    <div id="article-preview" class="article-preview hidden">
      <div class="article-meta">
        <h2 id="article-title" class="article-title"></h2>
        <div class="article-info">
          <span id="article-domain"></span>
          <span id="article-wordcount"></span>
          <span id="article-readtime"></span>
        </div>
      </div>
      <div id="article-content" class="article-content"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>集中モード中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f23;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .card {
      max-width: 420px;
      padding: 48px 40px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 28px; color: #e74c3c; margin-bottom: 12px; }
    p { font-size: 16px; color: #888; line-height: 1.6; margin-bottom: 24px; }
    .domain { color: #e74c3c; font-weight: 600; }
    #timer { font-size: 20px; color: #ccc; font-variant-numeric: tabular-nums; }
    .back-btn {
      margin-top: 24px;
      background: #1a1a3e;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
    }
    .back-btn:hover { background: #333; color: #e0e0e0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎯</div>
    <h1>集中モード中！</h1>
    <p>このサイトは集中タイム中にブロックされています。<br>今は仕事に集中しましょう！</p>
    <div id="timer">残り時間を計算中...</div>
    <br>
    <button class="back-btn" onclick="history.back()">← 戻る</button>
  </div>
  <script>
    function tick() {
      chrome.storage.local.get(['endsAt'], (data) => {
        if (!data.endsAt) return;
        const ms = Math.max(0, data.endsAt - Date.now());
        const m = Math.floor(ms / 60000).toString().padStart(2, '0');
        const s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timer').textContent = `残り ${m}:${s}`;
      });
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>

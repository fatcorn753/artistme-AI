<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Clean Reader</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#0f172a;color:#cbd5e1;font-family:Georgia,'Times New Roman',serif;min-height:100vh; }
    .reader-bar { position:fixed;top:0;left:0;right:0;background:rgba(15,23,42,0.95);backdrop-filter:blur(8px); border-bottom:1px solid #334155;padding:8px 24px;display:flex;align-items:center;gap:12px;z-index:100; }
    .reader-bar h2 { font-size:13px;color:#60a5fa;font-family:sans-serif;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .close-btn { background:#1e293b;border:1px solid #334155;border-radius:6px;color:#64748b;padding:5px 12px;cursor:pointer;font-size:12px; }
    .close-btn:hover { border-color:#60a5fa;color:#60a5fa; }
    .size-btn { background:none;border:1px solid #334155;border-radius:5px;color:#64748b;width:28px;height:28px;cursor:pointer;font-size:14px; }
    .size-btn:hover { border-color:#60a5fa;color:#60a5fa; }
    .content-wrap { max-width:680px;margin:80px auto 60px;padding:0 32px; }
    .article-title { font-size:28px;font-weight:700;color:#f1f5f9;line-height:1.3;margin-bottom:16px; }
    .article-meta  { font-size:13px;color:#64748b;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #1e293b; }
    .article-body  { font-size:18px;line-height:1.9;color:#cbd5e1; }
    .article-body p { margin-bottom:16px; }
    .article-body h2,.article-body h3 { color:#94a3b8;margin:24px 0 12px;font-size:1.2em; }
    .article-body a { color:#60a5fa;text-decoration:none; }
    .article-body a:hover { text-decoration:underline; }
    .article-body img { max-width:100%;border-radius:8px;margin:12px 0; }
    .article-body blockquote { border-left:4px solid #334155;padding:8px 16px;margin:12px 0;color:#64748b;font-style:italic; }
    .article-body ul,.article-body ol { padding-left:24px;margin:10px 0; }
    .article-body li { margin:5px 0; }
    .progress-bar { position:fixed;top:0;left:0;height:3px;background:#60a5fa;transition:width 0.2s;z-index:200; }
  </style>
</head>
<body>
  <div class="progress-bar" id="progress"></div>
  <div class="reader-bar">
    <h2 id="page-title">読み込み中...</h2>
    <button class="size-btn" id="size-down">A-</button>
    <button class="size-btn" id="size-up">A+</button>
    <button class="close-btn" onclick="window.close()">✕ 閉じる</button>
  </div>
  <div class="content-wrap">
    <h1 class="article-title" id="article-title"></h1>
    <div class="article-meta" id="article-meta"></div>
    <div class="article-body" id="article-body"></div>
  </div>
  <script>
    let fontSize = 18;
    chrome.storage.local.get(['lastArticle'], d => {
      const a = d.lastArticle;
      if (!a) { document.getElementById('article-body').textContent = '記事データがありません'; return; }
      document.title = a.title || 'Clean Reader';
      document.getElementById('page-title').textContent = a.title || '';
      document.getElementById('article-title').textContent = a.title || '';
      const meta = [a.domain, a.author, a.publishDate].filter(Boolean).join(' · ');
      document.getElementById('article-meta').textContent = meta;
      document.getElementById('article-body').innerHTML = a.content || '';
    });

    window.addEventListener('scroll', () => {
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
      document.getElementById('progress').style.width = Math.min(100, pct) + '%';
    });

    document.getElementById('size-up').addEventListener('click', () => { fontSize=Math.min(28,fontSize+1); document.getElementById('article-body').style.fontSize=fontSize+'px'; });
    document.getElementById('size-down').addEventListener('click', () => { fontSize=Math.max(12,fontSize-1); document.getElementById('article-body').style.fontSize=fontSize+'px'; });
  </script>
</body>
</html>
